# Provider: "ollama" for local models, "gemini" for Google Gemini API
[llm]
provider = "gemini"

[ollama]
model = "smollm2"
base_url = "http://localhost:11434"
temperature = 0.7

[gemini]
model = "gemini-2.5-flash"
temperature = 0.7
# API key is read from GEMINI_API_KEY environment variable (set in .env)

[rag]
enabled = true
knowledge_dir = "/knowledge/"
chunk_size = 1000
chunk_overlap = 200
embedding_provider = "gemini"   # "gemini" or "ollama" (defaults to [llm].provider)
embedding_model = "models/gemini-embedding-001"  # Gemini: "models/gemini-embedding-001", Ollama: "nomic-embed-text"
top_k = 5
similarity_threshold = 0.7

[web_search]
enabled = false
tavily_api_key = ""
max_results = 3

[tts]
voice_ali = "en-GB-RyanNeural"
voice_amir = "en-US-AndrewNeural"
