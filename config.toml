# Provider: "ollama" for local models, "gemini" for Google Gemini API
[llm]
provider = "gemini"

[ollama]
model = "smollm2"
base_url = "http://localhost:11434"
temperature = 0.7

[gemini]
model = "gemini-2.5-flash"
temperature = 0.7
# API key is read from GEMINI_API_KEY environment variable (set in .env)

[tts]
voice_ali = "en-GB-RyanNeural"
voice_amir = "en-US-AndrewNeural"
